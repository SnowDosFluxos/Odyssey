<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odyssey</title>

  <style>
    body{
      background:black;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      overflow:hidden;
    }

    h1{
      font-size:5rem;
      text-shadow:0 0 20px purple;
      animation:flicker 2s infinite;
    }

    @keyframes flicker{
      0%{opacity:1;}
      50%{opacity:0.6;}
      100%{opacity:1;}
    }
  </style>
</head>
<body>

<h1>ODYSSEY</h1>

</body>
</html>
